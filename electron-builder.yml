appId: com.novax.commander
productName: NOVA-X
copyright: Copyright © 2026 NOVA-X Labs

directories:
  output: dist
  buildResources: build

files:
  - dist/**/*
  - electron/**/*
  - package.json
  - index.html
  - server.ts

win:
  target:
    - target: nsis
      arch:
        - x64
  icon: public/favicon.ico

nsis:
  oneClick: true
  allowToChangeInstallationDirectory: false
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: NOVA-X Commander
  runAfterFinish: true

publish:
  provider: github
  owner: mdfarhangamer001
  repo: react-example
  private: false
  releaseType: release
